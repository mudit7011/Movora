name: Daily Content Scrape

on:
  # Nightly schedule disabled — it re-created duplicate records every morning
  # (bare tmdbId vs the tv_/realtime-importer convention) with stale server URLs.
  # The realtime TMDB importer already covers now-playing/popular/latest on demand.
  # Re-enable the cron below only if you reinstate a deduped scrape.
  # schedule:
  #   - cron: '30 18 * * *'   # 12:00 AM IST (6:30 PM UTC)
  workflow_dispatch:  # manual trigger only (run from GitHub Actions UI)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (skip binary downloads)
        run: npm install --ignore-scripts
        working-directory: backend

      - name: Scrape latest movies (3 pages ≈ 60 movies)
        run: node scripts/scrape-vidsrc.js
        working-directory: backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TMDB_BEARER: ${{ secrets.TMDB_BEARER }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          SCRAPE_MAX_PAGES: '3'

      - name: Scrape latest TV shows (3 pages ≈ 60 shows)
        run: node scripts/scrape-vidsrc-shows.js
        working-directory: backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TMDB_BEARER: ${{ secrets.TMDB_BEARER }}
          SCRAPE_MAX_PAGES: '3'
